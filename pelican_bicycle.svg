<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="#e8f4f8"/>

  <!-- Ground -->
  <rect y="320" width="400" height="80" fill="#90c590"/>

  <!-- Bicycle Frame -->
  <g id="bicycle">
    <!-- Frame -->
    <line x1="120" y1="220" x2="180" y2="220" stroke="#333" stroke-width="3"/>
    <line x1="180" y1="220" x2="240" y2="220" stroke="#333" stroke-width="3"/>
    <line x1="240" y1="220" x2="280" y2="220" stroke="#333" stroke-width="3"/>
    <line x1="120" y1="220" x2="180" y2="280" stroke="#333" stroke-width="3"/>
    <line x1="180" y1="280" x2="240" y2="220" stroke="#333" stroke-width="3"/>

    <!-- Front wheel -->
    <circle cx="80" cy="280" r="40" fill="none" stroke="#333" stroke-width="3"/>
    <circle cx="80" cy="280" r="35" fill="none" stroke="#666" stroke-width="1"/>
    <circle cx="80" cy="280" r="30" fill="none" stroke="#666" stroke-width="1"/>
    <circle cx="80" cy="280" r="4" fill="#333"/>

    <!-- Back wheel -->
    <circle cx="280" cy="280" r="40" fill="none" stroke="#333" stroke-width="3"/>
    <circle cx="280" cy="280" r="35" fill="none" stroke="#666" stroke-width="1"/>
    <circle cx="280" cy="280" r="30" fill="none" stroke="#666" stroke-width="1"/>
    <circle cx="280" cy="280" r="4" fill="#333"/>

    <!-- Handlebars -->
    <line x1="80" y1="280" x2="100" y2="200" stroke="#333" stroke-width="3"/>
    <line x1="100" y1="200" x2="80" y2="180" stroke="#333" stroke-width="3"/>
    <line x1="100" y1="200" x2="120" y2="180" stroke="#333" stroke-width="3"/>

    <!-- Seat -->
    <ellipse cx="180" cy="210" rx="25" ry="8" fill="#8B4513"/>
  </g>

  <!-- Pelican -->
  <g id="pelican">
    <!-- Body -->
    <ellipse cx="180" cy="160" rx="45" ry="50" fill="#f5f5dc"/>

    <!-- Neck -->
    <path d="M 165 130 Q 160 100 170 80" stroke="#f5f5dc" stroke-width="18" fill="none" stroke-linecap="round"/>

    <!-- Head -->
    <circle cx="175" cy="65" r="20" fill="#f5f5dc"/>

    <!-- Eye -->
    <circle cx="185" cy="60" r="4" fill="#000"/>
    <circle cx="186" cy="59" r="1.5" fill="#fff"/>

    <!-- Large Bill/Pouch -->
    <path d="M 195 70 Q 230 65 260 90 Q 250 95 220 92 Q 200 90 195 85 Z" fill="#FFD700" stroke="#FFA500" stroke-width="1"/>

    <!-- Bill detail -->
    <path d="M 195 70 Q 230 65 260 90" stroke="#FFA500" stroke-width="1" fill="none"/>

    <!-- Wing -->
    <ellipse cx="140" cy="160" rx="30" ry="50" fill="#e6e6c8" opacity="0.8"/>

    <!-- Legs/Feet on pedals -->
    <line x1="175" y1="205" x2="170" y2="260" stroke="#ff9800" stroke-width="6" stroke-linecap="round"/>
    <line x1="185" y1="205" x2="190" y2="260" stroke="#ff9800" stroke-width="6" stroke-linecap="round"/>

    <!-- Feet -->
    <ellipse cx="170" cy="268" rx="8" ry="10" fill="#ff9800"/>
    <ellipse cx="190" cy="268" rx="8" ry="10" fill="#ff9800"/>

    <!-- Webbed feet detail -->
    <line x1="164" y1="275" x2="176" y2="275" stroke="#ff9800" stroke-width="1" opacity="0.6"/>
    <line x1="184" y1="275" x2="196" y2="275" stroke="#ff9800" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- Sun -->
  <circle cx="350" cy="50" r="30" fill="#FFD700"/>
  <line x1="350" y1="10" x2="350" y2="0" stroke="#FFD700" stroke-width="3"/>
  <line x1="390" y1="50" x2="400" y2="50" stroke="#FFD700" stroke-width="3"/>
  <line x1="380" y1="20" x2="387" y2="13" stroke="#FFD700" stroke-width="3"/>
  <line x1="380" y1="80" x2="387" y2="87" stroke="#FFD700" stroke-width="3"/>
</svg>
