<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky background -->
  <rect width="800" height="600" fill="#87CEEB"/>

  <!-- Ground -->
  <rect y="450" width="800" height="150" fill="#90EE90"/>

  <!-- Bicycle wheels -->
  <g id="back-wheel">
    <circle cx="250" cy="450" r="80" fill="none" stroke="#333" stroke-width="3"/>
    <circle cx="250" cy="450" r="5" fill="#333"/>
    <!-- Spokes -->
    <line x1="250" y1="370" x2="250" y2="530" stroke="#666" stroke-width="1"/>
    <line x1="250" y1="530" x2="250" y2="370" stroke="#666" stroke-width="1"/>
    <line x1="170" y1="450" x2="330" y2="450" stroke="#666" stroke-width="1"/>
    <line x1="330" y1="450" x2="170" y2="450" stroke="#666" stroke-width="1"/>
    <line x1="185" y1="385" x2="315" y2="515" stroke="#666" stroke-width="1"/>
    <line x1="315" y1="385" x2="185" y2="515" stroke="#666" stroke-width="1"/>
  </g>

  <g id="front-wheel">
    <circle cx="550" cy="450" r="80" fill="none" stroke="#333" stroke-width="3"/>
    <circle cx="550" cy="450" r="5" fill="#333"/>
    <!-- Spokes -->
    <line x1="550" y1="370" x2="550" y2="530" stroke="#666" stroke-width="1"/>
    <line x1="550" y1="530" x2="550" y2="370" stroke="#666" stroke-width="1"/>
    <line x1="470" y1="450" x2="630" y2="450" stroke="#666" stroke-width="1"/>
    <line x1="630" y1="450" x2="470" y2="450" stroke="#666" stroke-width="1"/>
    <line x1="485" y1="385" x2="615" y2="515" stroke="#666" stroke-width="1"/>
    <line x1="615" y1="385" x2="485" y2="515" stroke="#666" stroke-width="1"/>
  </g>

  <!-- Bicycle frame -->
  <g id="frame" stroke="#333" stroke-width="3" fill="none">
    <!-- Main frame -->
    <line x1="250" y1="450" x2="400" y2="280"/>
    <line x1="400" y1="280" x2="550" y2="450"/>
    <line x1="250" y1="450" x2="300" y2="330"/>
    <line x1="300" y1="330" x2="400" y2="280"/>
    <!-- Handlebars tube -->
    <line x1="550" y1="450" x2="550" y2="300"/>
  </g>

  <!-- Seat -->
  <ellipse cx="350" cy="310" rx="25" ry="12" fill="#8B4513" stroke="#333" stroke-width="2"/>

  <!-- Handlebars -->
  <g stroke="#333" stroke-width="3" fill="none">
    <line x1="520" y1="300" x2="580" y2="300"/>
    <circle cx="520" cy="300" r="8" fill="#333"/>
    <circle cx="580" cy="300" r="8" fill="#333"/>
  </g>

  <!-- Pedals and crank -->
  <g stroke="#333" stroke-width="2" fill="none">
    <circle cx="380" cy="380" r="20"/>
    <line x1="380" y1="360" x2="380" y2="400"/>
    <line x1="360" y1="380" x2="400" y2="380"/>
    <circle cx="380" cy="360" r="5" fill="#333"/>
    <circle cx="380" cy="400" r="5" fill="#333"/>
  </g>

  <!-- Pelican body -->
  <ellipse cx="400" cy="240" rx="70" ry="55" fill="#F5F5DC" stroke="#333" stroke-width="2"/>

  <!-- Pelican head -->
  <circle cx="460" cy="200" r="35" fill="#F5F5DC" stroke="#333" stroke-width="2"/>

  <!-- Pelican eye -->
  <circle cx="475" cy="190" r="6" fill="#000"/>
  <circle cx="477" cy="188" r="2" fill="#FFF"/>

  <!-- Pelican beak -->
  <path d="M 490 205 Q 540 215 545 220 Q 540 225 490 215" fill="#FFA500" stroke="#333" stroke-width="2"/>

  <!-- Pelican pouch (under beak) -->
  <path d="M 490 215 Q 520 240 510 260 Q 500 250 490 235" fill="#FFB347" stroke="#333" stroke-width="2"/>

  <!-- Pelican neck -->
  <path d="M 440 225 Q 420 240 400 260" stroke="#F5F5DC" stroke-width="25" fill="none" stroke-linecap="round"/>

  <!-- Pelican wings -->
  <ellipse cx="360" cy="240" rx="50" ry="45" fill="#D3D3D3" stroke="#333" stroke-width="2" transform="rotate(-30 360 240)"/>
  <ellipse cx="440" cy="240" rx="50" ry="45" fill="#D3D3D3" stroke="#333" stroke-width="2" transform="rotate(30 440 240)"/>

  <!-- Pelican legs gripping pedals -->
  <g stroke="#FF69B4" stroke-width="4" fill="none" stroke-linecap="round">
    <line x1="385" y1="295" x2="385" y2="360"/>
    <line x1="415" y1="295" x2="415" y2="360"/>
    <!-- Feet on pedals -->
    <circle cx="385" cy="360" r="6" fill="#FF69B4"/>
    <circle cx="415" cy="360" r="6" fill="#FF69B4"/>
  </g>

  <!-- Happy expression line on beak -->
  <path d="M 510 220 Q 520 225 525 220" stroke="#333" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
