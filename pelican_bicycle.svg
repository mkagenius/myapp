<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="#e6f2ff"/>

  <!-- Ground -->
  <rect y="300" width="400" height="100" fill="#90EE90"/>

  <!-- Bicycle wheels -->
  <circle cx="120" cy="300" r="40" fill="none" stroke="#333" stroke-width="3"/>
  <circle cx="280" cy="300" r="40" fill="none" stroke="#333" stroke-width="3"/>

  <!-- Wheel spokes -->
  <line x1="120" y1="260" x2="120" y2="340" stroke="#999" stroke-width="1"/>
  <line x1="80" y1="300" x2="160" y2="300" stroke="#999" stroke-width="1"/>
  <line x1="95" y1="275" x2="145" y2="325" stroke="#999" stroke-width="1"/>
  <line x1="145" y1="275" x2="95" y2="325" stroke="#999" stroke-width="1"/>

  <line x1="280" y1="260" x2="280" y2="340" stroke="#999" stroke-width="1"/>
  <line x1="240" y1="300" x2="320" y2="300" stroke="#999" stroke-width="1"/>
  <line x1="255" y1="275" x2="305" y2="325" stroke="#999" stroke-width="1"/>
  <line x1="305" y1="275" x2="255" y2="325" stroke="#999" stroke-width="1"/>

  <!-- Bicycle frame -->
  <line x1="120" y1="300" x2="200" y2="240" stroke="#333" stroke-width="4"/>
  <line x1="200" y1="240" x2="280" y2="300" stroke="#333" stroke-width="4"/>
  <line x1="120" y1="300" x2="200" y2="200" stroke="#333" stroke-width="4"/>
  <line x1="200" y1="200" x2="280" y2="300" stroke="#333" stroke-width="4"/>

  <!-- Handlebars -->
  <line x1="200" y1="200" x2="180" y2="180" stroke="#333" stroke-width="3"/>
  <line x1="180" y1="180" x2="160" y2="185" stroke="#333" stroke-width="3"/>
  <line x1="180" y1="180" x2="200" y2="175" stroke="#333" stroke-width="3"/>

  <!-- Seat -->
  <ellipse cx="200" cy="200" rx="18" ry="8" fill="#8B4513"/>

  <!-- Pedals -->
  <circle cx="200" cy="240" r="6" fill="#555"/>
  <line x1="200" y1="240" x2="200" y2="260" stroke="#555" stroke-width="3"/>

  <!-- Pelican body -->
  <ellipse cx="200" cy="190" rx="40" ry="35" fill="#FFF8DC"/>

  <!-- Pelican neck -->
  <path d="M 220 170 Q 240 150 250 140" fill="none" stroke="#FFF8DC" stroke-width="20" stroke-linecap="round"/>
  <path d="M 220 170 Q 240 150 250 140" fill="none" stroke="#FFD700" stroke-width="16"/>

  <!-- Pelican head -->
  <ellipse cx="260" cy="130" rx="25" ry="28" fill="#FFD700"/>

  <!-- Pelican eye -->
  <circle cx="273" cy="125" r="3" fill="#000"/>
  <circle cx="275" cy="123" r="1.5" fill="#fff"/>

  <!-- Pelican beak/pouch -->
  <path d="M 280 140 L 310 145 L 280 155 Z" fill="#FFB6C1" stroke="#FF69B4" stroke-width="1"/>
  <ellipse cx="295" cy="148" rx="12" ry="6" fill="#FFE4E1" opacity="0.7"/>

  <!-- Pelican wing -->
  <path d="M 200 195 Q 150 180 140 220" fill="none" stroke="#FFD700" stroke-width="18" stroke-linecap="round"/>
  <path d="M 195 190 Q 150 170 135 215" fill="none" stroke="#FFA500" stroke-width="12" stroke-linecap="round"/>

  <!-- Other wing -->
  <path d="M 200 195 Q 250 180 260 220" fill="none" stroke="#FFD700" stroke-width="18" stroke-linecap="round"/>
  <path d="M 205 190 Q 250 170 265 215" fill="none" stroke="#FFA500" stroke-width="12" stroke-linecap="round"/>

  <!-- Pelican legs on bicycle -->
  <line x1="190" y1="220" x2="185" y2="290" stroke="#666" stroke-width="4" stroke-linecap="round"/>
  <line x1="210" y1="220" x2="215" y2="290" stroke="#666" stroke-width="4" stroke-linecap="round"/>

  <!-- Feet on pedals -->
  <ellipse cx="183" cy="295" rx="6" ry="8" fill="#666"/>
  <ellipse cx="217" cy="295" rx="6" ry="8" fill="#666"/>

  <!-- Happy expression -->
  <path d="M 270 145 Q 275 150 280 145" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round"/>
</svg>
