<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="#e8f4f8"/>

  <!-- Bicycle Frame -->
  <line x1="150" y1="200" x2="250" y2="200" stroke="#333" stroke-width="4"/>
  <line x1="200" y1="200" x2="200" y2="100" stroke="#333" stroke-width="4"/>
  <line x1="150" y1="200" x2="200" y2="100" stroke="#333" stroke-width="4"/>
  <line x1="250" y1="200" x2="200" y2="100" stroke="#333" stroke-width="4"/>

  <!-- Handlebars -->
  <line x1="200" y1="100" x2="180" y2="80" stroke="#333" stroke-width="3"/>
  <line x1="200" y1="100" x2="220" y2="80" stroke="#333" stroke-width="3"/>
  <circle cx="175" cy="75" r="5" fill="#666"/>
  <circle cx="225" cy="75" r="5" fill="#666"/>

  <!-- Wheels -->
  <circle cx="150" cy="200" r="40" fill="none" stroke="#333" stroke-width="3"/>
  <circle cx="150" cy="200" r="35" fill="none" stroke="#666" stroke-width="1" opacity="0.5"/>
  <circle cx="150" cy="200" r="4" fill="#333"/>

  <circle cx="250" cy="200" r="40" fill="none" stroke="#333" stroke-width="3"/>
  <circle cx="250" cy="200" r="35" fill="none" stroke="#666" stroke-width="1" opacity="0.5"/>
  <circle cx="250" cy="200" r="4" fill="#333"/>

  <!-- Seat -->
  <ellipse cx="200" cy="95" rx="12" ry="8" fill="#8b4513"/>

  <!-- Pelican Body -->
  <ellipse cx="200" cy="85" rx="25" ry="20" fill="#f5f5f5" stroke="#333" stroke-width="2"/>

  <!-- Pelican Head -->
  <circle cx="220" cy="65" r="18" fill="#f5f5f5" stroke="#333" stroke-width="2"/>

  <!-- Pelican Eye -->
  <circle cx="228" cy="60" r="3" fill="#333"/>
  <circle cx="229" cy="59" r="1.5" fill="#fff"/>

  <!-- Pelican Beak (large pouch) -->
  <path d="M 235 68 Q 265 70 270 75 Q 265 78 235 75 Z" fill="#ffa500" stroke="#333" stroke-width="2"/>
  <path d="M 270 75 Q 275 73 278 75 Q 275 77 270 75 Z" fill="#ff8c00" stroke="#333" stroke-width="1"/>

  <!-- Pelican Neck -->
  <path d="M 225 80 Q 228 75 230 68" fill="none" stroke="#f5f5f5" stroke-width="8"/>
  <path d="M 225 80 Q 228 75 230 68" fill="none" stroke="#333" stroke-width="1"/>

  <!-- Pelican Wing -->
  <path d="M 200 88 Q 180 75 175 95" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  <path d="M 198 90 Q 182 80 178 95" fill="none" stroke="#999" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Pelican Legs on Pedals -->
  <line x1="200" y1="105" x2="190" y2="180" stroke="#f5f5f5" stroke-width="4"/>
  <line x1="200" y1="105" x2="210" y2="180" stroke="#f5f5f5" stroke-width="4"/>

  <!-- Feet on Pedals -->
  <ellipse cx="190" cy="185" rx="6" ry="8" fill="#ff6b35"/>
  <ellipse cx="210" cy="185" rx="6" ry="8" fill="#ff6b35"/>

  <!-- Pedals -->
  <circle cx="190" cy="185" r="4" fill="#666"/>
  <circle cx="210" cy="185" r="4" fill="#666"/>

  <!-- Pedal cranks -->
  <line x1="200" y1="200" x2="190" y2="185" stroke="#333" stroke-width="2"/>
  <line x1="200" y1="200" x2="210" y2="185" stroke="#333" stroke-width="2"/>

  <!-- Smile -->
  <path d="M 235 75 Q 240 80 235 82" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
</svg>
