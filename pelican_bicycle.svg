<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky background -->
  <rect width="400" height="300" fill="#87CEEB"/>

  <!-- Ground -->
  <rect y="220" width="400" height="80" fill="#90EE90"/>

  <!-- Bicycle wheels -->
  <!-- Front wheel -->
  <circle cx="320" cy="220" r="40" fill="none" stroke="#333" stroke-width="2"/>
  <circle cx="320" cy="220" r="35" fill="none" stroke="#666" stroke-width="1"/>
  <!-- Spokes front wheel -->
  <line x1="320" y1="180" x2="320" y2="260" stroke="#999" stroke-width="1"/>
  <line x1="280" y1="220" x2="360" y2="220" stroke="#999" stroke-width="1"/>
  <line x1="290" y1="190" x2="350" y2="250" stroke="#999" stroke-width="1"/>
  <line x1="350" y1="190" x2="290" y2="250" stroke="#999" stroke-width="1"/>

  <!-- Back wheel -->
  <circle cx="120" cy="220" r="40" fill="none" stroke="#333" stroke-width="2"/>
  <circle cx="120" cy="220" r="35" fill="none" stroke="#666" stroke-width="1"/>
  <!-- Spokes back wheel -->
  <line x1="120" y1="180" x2="120" y2="260" stroke="#999" stroke-width="1"/>
  <line x1="80" y1="220" x2="160" y2="220" stroke="#999" stroke-width="1"/>
  <line x1="90" y1="190" x2="150" y2="250" stroke="#999" stroke-width="1"/>
  <line x1="150" y1="190" x2="90" y2="250" stroke="#999" stroke-width="1"/>

  <!-- Bicycle frame -->
  <line x1="120" y1="220" x2="220" y2="140" stroke="#1a1a1a" stroke-width="3"/>
  <line x1="220" y1="140" x2="320" y2="220" stroke="#1a1a1a" stroke-width="3"/>
  <line x1="220" y1="140" x2="120" y2="220" stroke="#1a1a1a" stroke-width="3"/>
  <line x1="220" y1="140" x2="320" y2="220" stroke="#1a1a1a" stroke-width="3"/>
  <!-- Seat tube -->
  <line x1="220" y1="140" x2="220" y2="200" stroke="#1a1a1a" stroke-width="3"/>

  <!-- Handlebars -->
  <line x1="320" y1="220" x2="340" y2="180" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="340" cy="180" r="8" fill="#333"/>

  <!-- Seat -->
  <ellipse cx="220" cy="200" rx="15" ry="8" fill="#8B4513"/>

  <!-- Pedals and crank -->
  <circle cx="220" cy="200" r="5" fill="#666"/>
  <line x1="220" y1="200" x2="210" y2="185" stroke="#666" stroke-width="3"/>
  <circle cx="210" cy="185" r="4" fill="#444"/>

  <!-- Pelican body -->
  <ellipse cx="200" cy="130" rx="35" ry="45" fill="#FFE4B5"/>

  <!-- Pelican neck -->
  <path d="M 195 90 Q 190 70 185 50" stroke="#FFE4B5" stroke-width="12" fill="none"/>

  <!-- Pelican head -->
  <circle cx="180" cy="35" r="18" fill="#FFE4B5"/>

  <!-- Pelican eye -->
  <circle cx="188" cy="30" r="4" fill="#000"/>
  <circle cx="189" cy="29" r="1.5" fill="#fff"/>

  <!-- Pelican beak -->
  <path d="M 172 35 L 150 32 L 172 38 Z" fill="#FFB6C1"/>
  <path d="M 172 35 L 150 32" stroke="#FFB6C1" stroke-width="2" fill="none"/>
  <path d="M 172 38 L 150 35" stroke="#FFB6C1" stroke-width="2" fill="none"/>

  <!-- Pelican pouch under beak -->
  <ellipse cx="155" cy="40" rx="12" ry="10" fill="#FFB6C1" opacity="0.7"/>

  <!-- Pelican wing -->
  <path d="M 180 120 Q 150 115 145 140" stroke="#DEB887" stroke-width="8" fill="none"/>

  <!-- Pelican legs -->
  <line x1="200" y1="170" x2="195" y2="210" stroke="#FFB6C1" stroke-width="3"/>
  <line x1="210" y1="170" x2="215" y2="210" stroke="#FFB6C1" stroke-width="3"/>

  <!-- Feet on pedals -->
  <ellipse cx="193" cy="212" rx="5" ry="4" fill="#FFB6C1"/>
  <ellipse cx="217" cy="212" rx="5" ry="4" fill="#FFB6C1"/>

  <!-- Happy expression on pelican -->
  <path d="M 175 40 Q 180 45 185 40" stroke="#000" stroke-width="1" fill="none"/>
</svg>
