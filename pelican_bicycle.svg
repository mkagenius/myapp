<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky background -->
  <rect width="400" height="500" fill="#e0f6ff"/>

  <!-- Ground -->
  <ellipse cx="200" cy="480" rx="180" ry="30" fill="#90ee90"/>

  <!-- Bicycle frame -->
  <g id="bicycle">
    <!-- Back wheel -->
    <circle cx="120" cy="350" r="60" fill="none" stroke="#333" stroke-width="3"/>
    <circle cx="120" cy="350" r="3" fill="#333"/>
    <!-- wheel spokes -->
    <line x1="120" y1="290" x2="120" y2="410" stroke="#666" stroke-width="1"/>
    <line x1="60" y1="350" x2="180" y2="350" stroke="#666" stroke-width="1"/>
    <line x1="75" y1="305" x2="165" y2="395" stroke="#666" stroke-width="1"/>
    <line x1="75" y1="395" x2="165" y2="305" stroke="#666" stroke-width="1"/>

    <!-- Front wheel -->
    <circle cx="280" cy="350" r="60" fill="none" stroke="#333" stroke-width="3"/>
    <circle cx="280" cy="350" r="3" fill="#333"/>
    <!-- wheel spokes -->
    <line x1="280" y1="290" x2="280" y2="410" stroke="#666" stroke-width="1"/>
    <line x1="220" y1="350" x2="340" y2="350" stroke="#666" stroke-width="1"/>
    <line x1="235" y1="305" x2="325" y2="395" stroke="#666" stroke-width="1"/>
    <line x1="235" y1="395" x2="325" y2="305" stroke="#666" stroke-width="1"/>

    <!-- Frame -->
    <line x1="120" y1="350" x2="200" y2="280" stroke="#333" stroke-width="4"/>
    <line x1="200" y1="280" x2="280" y2="350" stroke="#333" stroke-width="4"/>
    <line x1="200" y1="280" x2="120" y2="350" stroke="#333" stroke-width="4"/>
    <line x1="200" y1="280" x2="280" y2="350" stroke="#333" stroke-width="4"/>

    <!-- Seat post and seat -->
    <line x1="200" y1="280" x2="200" y2="240" stroke="#333" stroke-width="2"/>
    <ellipse cx="200" cy="235" rx="25" ry="12" fill="#8b4513" stroke="#333" stroke-width="2"/>

    <!-- Handlebars -->
    <line x1="280" y1="320" x2="280" y2="280" stroke="#333" stroke-width="3"/>
    <line x1="260" y1="280" x2="300" y2="280" stroke="#333" stroke-width="3"/>
    <circle cx="260" cy="280" r="5" fill="#333"/>
    <circle cx="300" cy="280" r="5" fill="#333"/>

    <!-- Pedals and crank -->
    <circle cx="200" cy="320" r="8" fill="#555" stroke="#333" stroke-width="2"/>
    <line x1="200" y1="312" x2="200" y2="328" stroke="#333" stroke-width="2"/>
    <line x1="192" y1="320" x2="208" y2="320" stroke="#333" stroke-width="2"/>
  </g>

  <!-- Pelican -->
  <g id="pelican">
    <!-- Body -->
    <ellipse cx="200" cy="200" rx="45" ry="55" fill="#f5f5dc" stroke="#333" stroke-width="2"/>

    <!-- Wing -->
    <path d="M 235 190 Q 280 170 290 210 Q 280 200 240 210" fill="#dcdcdc" stroke="#333" stroke-width="2"/>

    <!-- Neck -->
    <path d="M 210 145 Q 220 120 225 90" stroke="#f5f5dc" stroke-width="20" fill="none" stroke-linecap="round"/>

    <!-- Head -->
    <ellipse cx="228" cy="70" rx="22" ry="28" fill="#f5f5dc" stroke="#333" stroke-width="2"/>

    <!-- Eye -->
    <circle cx="235" cy="60" r="5" fill="#333"/>
    <circle cx="237" cy="58" r="2" fill="white"/>

    <!-- Large bill/pouch -->
    <path d="M 240 75 L 310 80 Q 320 82 315 95 L 245 92" fill="#ffa500" stroke="#333" stroke-width="2"/>
    <path d="M 245 92 Q 280 95 315 95 L 310 88 Q 280 85 245 88" fill="#ffb84d" stroke="#333" stroke-width="1"/>

    <!-- Leg on left side -->
    <line x1="180" y1="255" x2="170" y2="330" stroke="#333" stroke-width="3"/>
    <g>
      <circle cx="168" cy="335" r="4" fill="#ff9999"/>
      <line x1="160" y1="335" x2="160" y2="345" stroke="#333" stroke-width="2"/>
      <line x1="165" y1="335" x2="165" y2="345" stroke="#333" stroke-width="2"/>
      <line x1="170" y1="335" x2="170" y2="345" stroke="#333" stroke-width="2"/>
    </g>

    <!-- Leg on right side (on pedal) -->
    <line x1="220" y1="255" x2="210" y2="315" stroke="#333" stroke-width="3"/>
    <g>
      <circle cx="208" cy="320" r="4" fill="#ff9999"/>
      <line x1="200" y1="320" x2="200" y2="330" stroke="#333" stroke-width="2"/>
      <line x1="205" y1="320" x2="205" y2="330" stroke="#333" stroke-width="2"/>
      <line x1="210" y1="320" x2="210" y2="330" stroke="#333" stroke-width="2"/>
    </g>
  </g>

  <!-- Smile/expression -->
  <path d="M 230 110 Q 240 105 250 110" stroke="#333" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
