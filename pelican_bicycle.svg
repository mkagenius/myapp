<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="500" fill="#e8f4f8"/>

  <!-- Ground -->
  <ellipse cx="200" cy="450" rx="180" ry="30" fill="#90ee90" opacity="0.5"/>

  <!-- Bicycle Wheels -->
  <circle cx="120" cy="380" r="50" fill="none" stroke="#333" stroke-width="3"/>
  <circle cx="280" cy="380" r="50" fill="none" stroke="#333" stroke-width="3"/>

  <!-- Wheel spokes -->
  <g stroke="#666" stroke-width="1">
    <line x1="120" y1="330" x2="120" y2="430"/>
    <line x1="70" y1="380" x2="170" y2="380"/>
    <line x1="85" y1="345" x2="155" y2="415"/>
    <line x1="85" y1="415" x2="155" y2="345"/>

    <line x1="280" y1="330" x2="280" y2="430"/>
    <line x1="230" y1="380" x2="330" y2="380"/>
    <line x1="245" y1="345" x2="315" y2="415"/>
    <line x1="245" y1="415" x2="315" y2="345"/>
  </g>

  <!-- Bicycle Frame -->
  <line x1="120" y1="380" x2="200" y2="280" stroke="#333" stroke-width="4"/>
  <line x1="280" y1="380" x2="200" y2="280" stroke="#333" stroke-width="4"/>
  <line x1="200" y1="280" x2="120" y2="380" stroke="#333" stroke-width="4"/>

  <!-- Bicycle Seat -->
  <ellipse cx="180" cy="270" rx="25" ry="8" fill="#8b4513" stroke="#333" stroke-width="2"/>
  <line x1="180" y1="278" x2="180" y2="300" stroke="#333" stroke-width="2"/>

  <!-- Handlebars -->
  <path d="M 210 260 Q 220 240 210 220" fill="none" stroke="#333" stroke-width="3"/>
  <circle cx="200" cy="215" r="5" fill="#666"/>
  <circle cx="220" cy="215" r="5" fill="#666"/>

  <!-- Pedals -->
  <circle cx="200" cy="320" r="8" fill="#666"/>
  <line x1="200" y1="320" x2="190" y2="310" stroke="#333" stroke-width="2"/>
  <line x1="200" y1="320" x2="210" y2="330" stroke="#333" stroke-width="2"/>

  <!-- Pelican Body -->
  <ellipse cx="200" cy="240" rx="45" ry="50" fill="#f5f5dc" stroke="#333" stroke-width="2"/>

  <!-- Pelican Neck -->
  <path d="M 185 195 Q 180 170 190 140" fill="none" stroke="#f5f5dc" stroke-width="20"/>
  <path d="M 185 195 Q 180 170 190 140" fill="none" stroke="#333" stroke-width="1"/>

  <!-- Pelican Head -->
  <circle cx="195" cy="120" r="25" fill="#f5f5dc" stroke="#333" stroke-width="2"/>

  <!-- Pelican Eye -->
  <circle cx="205" cy="115" r="4" fill="#000"/>
  <circle cx="207" cy="113" r="1.5" fill="#fff"/>

  <!-- Pelican Beak - Upper -->
  <path d="M 220 125 Q 280 120 290 130" fill="none" stroke="#ff9999" stroke-width="8" stroke-linecap="round"/>

  <!-- Pelican Beak - Lower (Pouch) -->
  <path d="M 220 135 Q 260 145 290 130" fill="#ffb3b3" stroke="#ff9999" stroke-width="2"/>
  <path d="M 290 130 Q 285 150 260 155" fill="#ffb3b3" stroke="#ff9999" stroke-width="2"/>

  <!-- Pelican Wing -->
  <path d="M 160 230 Q 140 210 135 260 Q 140 280 160 270" fill="#f0e68c" stroke="#333" stroke-width="1.5"/>

  <!-- Pelican Legs -->
  <line x1="190" y1="280" x2="185" y2="350" stroke="#ff9999" stroke-width="4"/>
  <line x1="210" y1="280" x2="215" y2="350" stroke="#ff9999" stroke-width="4"/>

  <!-- Pelican Feet -->
  <g stroke="#ff9999" stroke-width="3" fill="none">
    <path d="M 185 350 L 180 365 M 185 350 L 185 365 M 185 350 L 190 365"/>
    <path d="M 215 350 L 210 365 M 215 350 L 215 365 M 215 350 L 220 365"/>
  </g>

  <!-- Happy expression -->
  <path d="M 200 135 Q 205 145 210 140" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
</svg>