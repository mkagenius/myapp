<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Define some styles -->
  <defs>
    <style>
      .bike-frame { stroke: #333; stroke-width: 3; fill: none; }
      .bike-wheel { stroke: #333; stroke-width: 2; fill: none; }
      .pelican-body { fill: #f5f5dc; }
      .pelican-eye { fill: #000; }
      .pelican-beak { fill: #ff9900; }
    </style>
  </defs>

  <!-- Back wheel -->
  <circle class="bike-wheel" cx="320" cy="280" r="60"/>
  <circle class="bike-wheel" cx="320" cy="280" r="8" fill="#333"/>
  <!-- Wheel spokes -->
  <line class="bike-wheel" x1="320" y1="220" x2="320" y2="340"/>
  <line class="bike-wheel" x1="260" y1="280" x2="380" y2="280"/>
  <line class="bike-wheel" x1="268" y1="228" x2="372" y2="332"/>
  <line class="bike-wheel" x1="372" y1="228" x2="268" y2="332"/>

  <!-- Front wheel -->
  <circle class="bike-wheel" cx="120" cy="280" r="60"/>
  <circle class="bike-wheel" cx="120" cy="280" r="8" fill="#333"/>
  <!-- Wheel spokes -->
  <line class="bike-wheel" x1="120" y1="220" x2="120" y2="340"/>
  <line class="bike-wheel" x1="60" y1="280" x2="180" y2="280"/>
  <line class="bike-wheel" x1="68" y1="228" x2="172" y2="332"/>
  <line class="bike-wheel" x1="172" y1="228" x2="68" y2="332"/>

  <!-- Bike frame -->
  <line class="bike-frame" x1="120" y1="280" x2="200" y2="200"/>
  <line class="bike-frame" x1="200" y1="200" x2="320" y2="280"/>
  <line class="bike-frame" x1="200" y1="200" x2="220" y2="240"/>
  <line class="bike-frame" x1="220" y1="240" x2="320" y2="280"/>
  <line class="bike-frame" x1="200" y1="200" x2="120" y2="280"/>

  <!-- Handlebars -->
  <line class="bike-frame" x1="120" y1="280" x2="100" y2="220"/>
  <line class="bike-frame" x1="100" y1="220" x2="80" y2="220"/>
  <line class="bike-frame" x1="100" y1="220" x2="120" y2="220"/>

  <!-- Seat -->
  <ellipse cx="220" cy="235" rx="25" ry="12" fill="#333"/>

  <!-- Pelican body -->
  <ellipse class="pelican-body" cx="220" cy="180" rx="45" ry="50"/>

  <!-- Pelican neck -->
  <path class="pelican-body" d="M 220 130 Q 220 110 210 100"/>

  <!-- Pelican head -->
  <circle class="pelican-body" cx="210" cy="85" r="25"/>

  <!-- Pelican beak (distinctive long beak) -->
  <path class="pelican-beak" d="M 225 80 L 280 75 L 225 95 Z"/>
  <path class="pelican-beak" d="M 225 80 L 280 75 L 225 90" stroke="#cc7700" stroke-width="1" fill="none"/>

  <!-- Pelican pouch under beak -->
  <ellipse class="pelican-beak" cx="240" cy="95" rx="20" ry="15" opacity="0.7"/>

  <!-- Pelican eye -->
  <circle class="pelican-eye" cx="215" cy="80" r="3"/>

  <!-- Pelican wings -->
  <ellipse cx="190" cy="175" rx="20" ry="40" fill="#e6e6d9" transform="rotate(-30 190 175)"/>
  <ellipse cx="250" cy="175" rx="20" ry="40" fill="#e6e6d9" transform="rotate(30 250 175)"/>

  <!-- Pelican legs on bike -->
  <line x1="210" y1="230" x2="210" y2="260" stroke="#ff9900" stroke-width="3"/>
  <line x1="230" y1="230" x2="230" y2="260" stroke="#ff9900" stroke-width="3"/>

  <!-- Feet on pedals -->
  <circle cx="210" cy="260" r="6" fill="#ff9900"/>
  <circle cx="230" cy="260" r="6" fill="#ff9900"/>

  <!-- Pedals -->
  <circle cx="210" cy="260" r="10" fill="none" stroke="#333" stroke-width="2"/>
  <circle cx="230" cy="260" r="10" fill="none" stroke="#333" stroke-width="2"/>

  <!-- Fun smile -->
  <path d="M 210 100 Q 215 105 220 100" stroke="#666" stroke-width="1" fill="none"/>
</svg>
