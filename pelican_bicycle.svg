<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="#e8f4f8"/>

  <!-- Ground -->
  <rect y="320" width="400" height="80" fill="#90ee90"/>

  <!-- Bicycle Frame -->
  <line x1="120" y1="200" x2="280" y2="200" stroke="#333" stroke-width="3"/>
  <line x1="200" y1="200" x2="200" y2="260" stroke="#333" stroke-width="3"/>
  <line x1="120" y1="200" x2="200" y2="260" stroke="#333" stroke-width="3"/>
  <line x1="280" y1="200" x2="200" y2="260" stroke="#333" stroke-width="3"/>

  <!-- Front Wheel -->
  <circle cx="120" cy="270" r="40" fill="none" stroke="#333" stroke-width="3"/>
  <circle cx="120" cy="270" r="35" fill="none" stroke="#666" stroke-width="1"/>
  <circle cx="120" cy="270" r="30" fill="none" stroke="#666" stroke-width="1"/>
  <circle cx="120" cy="270" r="4" fill="#333"/>

  <!-- Back Wheel -->
  <circle cx="280" cy="270" r="40" fill="none" stroke="#333" stroke-width="3"/>
  <circle cx="280" cy="270" r="35" fill="none" stroke="#666" stroke-width="1"/>
  <circle cx="280" cy="270" r="30" fill="none" stroke="#666" stroke-width="1"/>
  <circle cx="280" cy="270" r="4" fill="#333"/>

  <!-- Handlebars -->
  <line x1="120" y1="200" x2="120" y2="160" stroke="#333" stroke-width="3"/>
  <line x1="100" y1="155" x2="140" y2="155" stroke="#333" stroke-width="2"/>

  <!-- Seat -->
  <ellipse cx="200" cy="185" rx="20" ry="8" fill="#8b4513"/>

  <!-- Pelican Body -->
  <ellipse cx="200" cy="120" rx="35" ry="45" fill="#f0e68c"/>

  <!-- Pelican Head -->
  <circle cx="200" cy="70" r="25" fill="#f0e68c"/>

  <!-- Pelican's distinctive pouch -->
  <path d="M 190 85 Q 185 100 190 110 Q 200 115 210 110 Q 215 100 210 85" fill="#daa520" stroke="#d4a574" stroke-width="2"/>

  <!-- Pelican Eye -->
  <circle cx="208" cy="65" r="4" fill="#000"/>
  <circle cx="209" cy="64" r="1.5" fill="#fff"/>

  <!-- Pelican Beak -->
  <line x1="215" y1="70" x2="240" y2="75" stroke="#d4a574" stroke-width="4" stroke-linecap="round"/>
  <line x1="215" y1="78" x2="240" y2="83" stroke="#b8860b" stroke-width="3" stroke-linecap="round"/>

  <!-- Pelican Wing -->
  <path d="M 175 110 Q 150 100 145 130 Q 150 140 175 135" fill="#d4a520" stroke="#b8860b" stroke-width="1.5"/>

  <!-- Pelican Tail feathers -->
  <path d="M 165 155 L 150 185 L 160 160" fill="#d4a520"/>
  <path d="M 175 160 L 170 190 L 180 165" fill="#d4a520"/>

  <!-- Legs -->
  <line x1="185" y1="155" x2="185" y2="200" stroke="#8b7355" stroke-width="3"/>
  <line x1="215" y1="155" x2="215" y2="200" stroke="#8b7355" stroke-width="3"/>

  <!-- Feet on pedals -->
  <circle cx="185" cy="210" r="6" fill="#8b7355"/>
  <circle cx="215" cy="210" r="6" fill="#8b7355"/>

  <!-- Pedals -->
  <circle cx="200" cy="240" r="8" fill="#555"/>

  <!-- Happy expression lines -->
  <path d="M 190 75 Q 200 85 210 75" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round"/>
</svg>
