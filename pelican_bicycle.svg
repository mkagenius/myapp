<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Bicycle Frame -->
  <g id="bicycle">
    <!-- Back wheel -->
    <circle cx="100" cy="280" r="70" fill="none" stroke="#333" stroke-width="3"/>
    <circle cx="100" cy="280" r="60" fill="none" stroke="#666" stroke-width="1"/>
    <circle cx="100" cy="280" r="50" fill="none" stroke="#666" stroke-width="1"/>
    <circle cx="100" cy="280" r="8" fill="#333"/>

    <!-- Front wheel -->
    <circle cx="300" cy="280" r="70" fill="none" stroke="#333" stroke-width="3"/>
    <circle cx="300" cy="280" r="60" fill="none" stroke="#666" stroke-width="1"/>
    <circle cx="300" cy="280" r="50" fill="none" stroke="#666" stroke-width="1"/>
    <circle cx="300" cy="280" r="8" fill="#333"/>

    <!-- Frame -->
    <line x1="100" y1="280" x2="150" y2="180" stroke="#333" stroke-width="4"/>
    <line x1="150" y1="180" x2="300" y2="280" stroke="#333" stroke-width="4"/>
    <line x1="150" y1="180" x2="100" y2="280" stroke="#333" stroke-width="4"/>
    <line x1="150" y1="180" x2="200" y2="240" stroke="#333" stroke-width="3"/>

    <!-- Handlebars -->
    <line x1="300" y1="280" x2="300" y2="160" stroke="#333" stroke-width="3"/>
    <line x1="280" y1="150" x2="320" y2="150" stroke="#333" stroke-width="3"/>

    <!-- Seat -->
    <ellipse cx="150" cy="170" rx="25" ry="8" fill="#555" stroke="#333" stroke-width="2"/>
    <line x1="150" y1="178" x2="150" y2="190" stroke="#333" stroke-width="2"/>
  </g>

  <!-- Pelican Body -->
  <g id="pelican">
    <!-- Body -->
    <ellipse cx="180" cy="200" rx="45" ry="50" fill="#f5f5f5" stroke="#333" stroke-width="2"/>

    <!-- Neck -->
    <path d="M 180 150 Q 185 130 190 110" stroke="#f5f5f5" stroke-width="35" fill="none" stroke-linecap="round"/>
    <path d="M 180 150 Q 185 130 190 110" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Head -->
    <circle cx="190" cy="90" r="28" fill="#f5f5f5" stroke="#333" stroke-width="2"/>

    <!-- Eye -->
    <circle cx="205" cy="80" r="5" fill="#333"/>
    <circle cx="206" cy="79" r="2" fill="#fff"/>

    <!-- Bill (distinctive pelican feature) -->
    <path d="M 205 95 L 270 100 Q 275 100 275 105 L 270 108 Q 240 105 205 100"
          fill="#FFB84D" stroke="#333" stroke-width="2"/>

    <!-- Throat pouch -->
    <path d="M 210 105 Q 240 110 270 108 Q 268 125 240 130 Q 210 128 210 115"
          fill="#FFC869" stroke="#333" stroke-width="1.5"/>

    <!-- Wings -->
    <ellipse cx="160" cy="200" rx="30" ry="55" fill="#e0e0e0" stroke="#333" stroke-width="2" transform="rotate(-35 160 200)"/>
    <ellipse cx="200" cy="200" rx="30" ry="55" fill="#e0e0e0" stroke="#333" stroke-width="2" transform="rotate(35 200 200)"/>

    <!-- Wing details -->
    <path d="M 140 180 Q 135 200 140 230" stroke="#333" stroke-width="1" fill="none" opacity="0.5"/>
    <path d="M 145 175 Q 140 200 145 235" stroke="#333" stroke-width="1" fill="none" opacity="0.5"/>
    <path d="M 220 175 Q 225 200 220 235" stroke="#333" stroke-width="1" fill="none" opacity="0.5"/>
    <path d="M 215 180 Q 220 200 215 230" stroke="#333" stroke-width="1" fill="none" opacity="0.5"/>

    <!-- Tail feathers -->
    <path d="M 160 240 Q 140 260 145 290" stroke="#333" stroke-width="3" fill="none"/>
    <path d="M 170 245 Q 160 270 165 295" stroke="#333" stroke-width="3" fill="none"/>
    <path d="M 180 248 Q 175 275 180 300" stroke="#333" stroke-width="3" fill="none"/>

    <!-- Legs -->
    <line x1="165" y1="240" x2="165" y2="270" stroke="#555" stroke-width="5" stroke-linecap="round"/>
    <line x1="195" y1="240" x2="195" y2="270" stroke="#555" stroke-width="5" stroke-linecap="round"/>

    <!-- Feet on pedals -->
    <circle cx="160" cy="268" r="6" fill="#555"/>
    <circle cx="200" cy="268" r="6" fill="#555"/>
  </g>

  <!-- Pedals (offset for riding effect) -->
  <circle cx="160" cy="268" r="4" fill="#666"/>
  <circle cx="200" cy="268" r="4" fill="#666"/>

  <!-- Motion lines -->
  <line x1="20" y1="220" x2="60" y2="220" stroke="#999" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
  <line x1="30" y1="250" x2="65" y2="250" stroke="#999" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
  <line x1="15" y1="280" x2="55" y2="280" stroke="#999" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
</svg>
