<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky background -->
  <rect width="400" height="300" fill="#87CEEB"/>

  <!-- Ground -->
  <ellipse cx="200" cy="280" rx="180" ry="30" fill="#90EE90"/>

  <!-- Bicycle wheels -->
  <circle cx="120" cy="240" r="40" fill="none" stroke="#333" stroke-width="2"/>
  <circle cx="120" cy="240" r="35" fill="none" stroke="#888" stroke-width="1"/>
  <!-- Spokes for front wheel -->
  <line x1="120" y1="205" x2="120" y2="275" stroke="#888" stroke-width="0.5"/>
  <line x1="85" y1="240" x2="155" y2="240" stroke="#888" stroke-width="0.5"/>
  <line x1="90" y1="210" x2="150" y2="270" stroke="#888" stroke-width="0.5"/>
  <line x1="150" y1="210" x2="90" y2="270" stroke="#888" stroke-width="0.5"/>

  <circle cx="280" cy="240" r="40" fill="none" stroke="#333" stroke-width="2"/>
  <circle cx="280" cy="240" r="35" fill="none" stroke="#888" stroke-width="1"/>
  <!-- Spokes for back wheel -->
  <line x1="280" y1="205" x2="280" y2="275" stroke="#888" stroke-width="0.5"/>
  <line x1="245" y1="240" x2="315" y2="240" stroke="#888" stroke-width="0.5"/>
  <line x1="250" y1="210" x2="310" y2="270" stroke="#888" stroke-width="0.5"/>
  <line x1="310" y1="210" x2="250" y2="270" stroke="#888" stroke-width="0.5"/>

  <!-- Bicycle frame -->
  <line x1="120" y1="240" x2="180" y2="180" stroke="#333" stroke-width="3"/>
  <line x1="180" y1="180" x2="280" y2="240" stroke="#333" stroke-width="3"/>
  <line x1="180" y1="180" x2="120" y2="240" stroke="#333" stroke-width="3"/>
  <line x1="180" y1="180" x2="280" y2="240" stroke="#333" stroke-width="3"/>

  <!-- Seat -->
  <ellipse cx="185" cy="170" rx="20" ry="8" fill="#8B4513" stroke="#333" stroke-width="1"/>
  <line x1="175" y1="172" x2="170" y2="185" stroke="#333" stroke-width="2"/>
  <line x1="195" y1="172" x2="200" y2="185" stroke="#333" stroke-width="2"/>

  <!-- Handlebars -->
  <path d="M 140 195 Q 150 190 160 195" stroke="#333" stroke-width="2" fill="none"/>
  <circle cx="140" cy="195" r="3" fill="#333"/>
  <circle cx="160" cy="195" r="3" fill="#333"/>

  <!-- Pedals and cranks -->
  <circle cx="180" cy="210" r="4" fill="#333"/>
  <line x1="180" y1="206" x2="180" y2="214" stroke="#333" stroke-width="2"/>
  <line x1="176" y1="210" x2="184" y2="210" stroke="#333" stroke-width="2"/>

  <!-- Pelican body -->
  <ellipse cx="190" cy="140" rx="35" ry="45" fill="#F5DEB3" stroke="#333" stroke-width="1.5"/>

  <!-- Pelican neck -->
  <path d="M 210 110 Q 225 95 230 70" stroke="#F5DEB3" stroke-width="18" fill="none"/>
  <path d="M 210 110 Q 225 95 230 70" stroke="#333" stroke-width="1" fill="none"/>

  <!-- Pelican head -->
  <ellipse cx="235" cy="50" rx="18" ry="20" fill="#F5DEB3" stroke="#333" stroke-width="1.5"/>

  <!-- Pelican eye -->
  <circle cx="242" cy="45" r="3" fill="#000"/>
  <circle cx="243" cy="44" r="1" fill="#FFF"/>

  <!-- Pelican beak (large distinctive pouch) -->
  <path d="M 245 60 Q 270 65 280 70 Q 270 75 245 72 Z" fill="#FFD700" stroke="#333" stroke-width="1.5"/>
  <path d="M 245 60 Q 290 70 300 75" stroke="#333" stroke-width="1" fill="none"/>

  <!-- Pelican wings -->
  <path d="M 165 130 Q 140 120 135 145 Q 140 150 165 140 Z" fill="#D4A574" stroke="#333" stroke-width="1"/>
  <path d="M 215 130 Q 240 120 245 145 Q 240 150 215 140 Z" fill="#D4A574" stroke="#333" stroke-width="1"/>

  <!-- Wing details -->
  <line x1="170" y1="132" x2="145" y2="142" stroke="#333" stroke-width="0.5"/>
  <line x1="175" y1="135" x2="150" y2="145" stroke="#333" stroke-width="0.5"/>
  <line x1="210" y1="132" x2="235" y2="142" stroke="#333" stroke-width="0.5"/>
  <line x1="205" y1="135" x2="230" y2="145" stroke="#333" stroke-width="0.5"/>

  <!-- Pelican feet (gripping pedals) -->
  <g transform="translate(180, 215)">
    <path d="M -2 0 L -5 8 M 0 0 L 0 8 M 2 0 L 5 8" stroke="#FF8C00" stroke-width="1.5" fill="none"/>
    <circle cx="-5" cy="8" r="2" fill="#FF8C00"/>
    <circle cx="0" cy="8" r="2" fill="#FF8C00"/>
    <circle cx="5" cy="8" r="2" fill="#FF8C00"/>
  </g>

  <!-- Happy expression lines -->
  <path d="M 228 52 Q 230 55 232 52" stroke="#333" stroke-width="0.5" fill="none"/>
</svg>
