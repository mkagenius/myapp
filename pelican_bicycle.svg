<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Bicycle Frame -->
  <g id="bicycle">
    <!-- Back wheel -->
    <circle cx="100" cy="280" r="60" fill="none" stroke="#333" stroke-width="3"/>
    <circle cx="100" cy="280" r="55" fill="none" stroke="#999" stroke-width="1"/>

    <!-- Front wheel -->
    <circle cx="300" cy="280" r="60" fill="none" stroke="#333" stroke-width="3"/>
    <circle cx="300" cy="280" r="55" fill="none" stroke="#999" stroke-width="1"/>

    <!-- Frame -->
    <line x1="100" y1="280" x2="180" y2="150" stroke="#333" stroke-width="4"/>
    <line x1="180" y1="150" x2="300" y2="280" stroke="#333" stroke-width="4"/>
    <line x1="180" y1="150" x2="100" y2="280" stroke="#333" stroke-width="4"/>

    <!-- Seat -->
    <ellipse cx="160" cy="140" rx="25" ry="8" fill="#8B4513" stroke="#333" stroke-width="2"/>
    <line x1="155" y1="140" x2="155" y2="160" stroke="#333" stroke-width="2"/>
    <line x1="165" y1="140" x2="165" y2="160" stroke="#333" stroke-width="2"/>

    <!-- Handlebars -->
    <line x1="300" y1="180" x2="300" y2="150" stroke="#333" stroke-width="3"/>
    <path d="M 280 150 Q 300 145 320 150" fill="none" stroke="#333" stroke-width="3"/>
  </g>

  <!-- Pelican Body -->
  <g id="pelican">
    <!-- Body (brown/tan) -->
    <ellipse cx="200" cy="160" rx="50" ry="45" fill="#D2B48C" stroke="#333" stroke-width="2"/>

    <!-- Wing -->
    <path d="M 165 150 Q 140 140 135 165 Q 140 170 170 155" fill="#DAA520" stroke="#333" stroke-width="2"/>

    <!-- Head -->
    <circle cx="230" cy="130" r="28" fill="#D2B48C" stroke="#333" stroke-width="2"/>

    <!-- Eye -->
    <circle cx="240" cy="125" r="4" fill="#333"/>
    <circle cx="241" cy="124" r="1.5" fill="white"/>

    <!-- Long neck connection -->
    <line x1="235" y1="105" x2="240" y2="85" stroke="#D2B48C" stroke-width="8"/>

    <!-- Pelican's famous long beak -->
    <path d="M 245 85 L 280 75 Q 290 75 295 85 L 280 90 Q 275 88 245 92 Z" fill="#FF9999" stroke="#333" stroke-width="2"/>

    <!-- Beak pouch detail -->
    <path d="M 280 85 Q 285 88 280 92" fill="none" stroke="#FF6666" stroke-width="1.5"/>

    <!-- Leg on pedal -->
    <line x1="210" y1="200" x2="220" y2="240" stroke="#D2B48C" stroke-width="6" stroke-linecap="round"/>

    <!-- Other leg -->
    <line x1="215" y1="200" x2="210" y2="245" stroke="#D2B48C" stroke-width="6" stroke-linecap="round"/>

    <!-- Feet on pedals -->
    <circle cx="220" cy="250" r="4" fill="#FFB6C1"/>
    <circle cx="210" cy="250" r="4" fill="#FFB6C1"/>
  </g>

  <!-- Pedals -->
  <circle cx="200" cy="240" r="3" fill="#333"/>
  <circle cx="200" cy="270" r="3" fill="#333"/>

  <!-- Spokes detail -->
  <g id="back-spokes" stroke="#999" stroke-width="1" opacity="0.5">
    <line x1="100" y1="220" x2="100" y2="340"/>
    <line x1="60" y1="280" x2="140" y2="280"/>
    <line x1="70" y1="240" x2="130" y2="320"/>
    <line x1="130" y1="240" x2="70" y2="320"/>
  </g>

  <g id="front-spokes" stroke="#999" stroke-width="1" opacity="0.5">
    <line x1="300" y1="220" x2="300" y2="340"/>
    <line x1="260" y1="280" x2="340" y2="280"/>
    <line x1="270" y1="240" x2="330" y2="320"/>
    <line x1="330" y1="240" x2="270" y2="320"/>
  </g>
</svg>
