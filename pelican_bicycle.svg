<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky background -->
  <rect width="400" height="300" fill="#87CEEB"/>

  <!-- Ground -->
  <rect y="220" width="400" height="80" fill="#90EE90"/>

  <!-- Bicycle wheels -->
  <circle cx="100" cy="230" r="30" fill="none" stroke="#333" stroke-width="2"/>
  <circle cx="260" cy="230" r="30" fill="none" stroke="#333" stroke-width="2"/>

  <!-- Wheel spokes -->
  <g stroke="#333" stroke-width="1">
    <line x1="100" y1="200" x2="100" y2="260"/>
    <line x1="70" y1="230" x2="130" y2="230"/>
    <line x1="80" y1="210" x2="120" y2="250"/>
    <line x1="80" y1="250" x2="120" y2="210"/>

    <line x1="260" y1="200" x2="260" y2="260"/>
    <line x1="230" y1="230" x2="290" y2="230"/>
    <line x1="240" y1="210" x2="280" y2="250"/>
    <line x1="240" y1="250" x2="280" y2="210"/>
  </g>

  <!-- Bicycle frame -->
  <polyline points="100,230 180,180 260,230" fill="none" stroke="#444" stroke-width="3"/>
  <line x1="180" y1="180" x2="100" y2="230" stroke="#444" stroke-width="3"/>
  <line x1="180" y1="180" x2="260" y2="230" stroke="#444" stroke-width="3"/>

  <!-- Handlebars -->
  <polyline points="200,160 190,140 210,140" fill="none" stroke="#444" stroke-width="2" stroke-linecap="round"/>

  <!-- Seat -->
  <ellipse cx="170" cy="175" rx="15" ry="8" fill="#8B4513"/>

  <!-- Pelican body -->
  <ellipse cx="185" cy="155" rx="35" ry="45" fill="#FFF8DC"/>

  <!-- Pelican head -->
  <circle cx="200" cy="110" r="20" fill="#FFF8DC"/>

  <!-- Pelican eye -->
  <circle cx="208" cy="108" r="3" fill="#000"/>
  <circle cx="209" cy="107" r="1" fill="#fff"/>

  <!-- Pelican beak (the iconic pouch) -->
  <path d="M 218 115 Q 240 120 245 130 Q 240 125 218 120 Z" fill="#FFD700"/>
  <path d="M 218 115 Q 240 120 245 130" fill="none" stroke="#DAA520" stroke-width="1"/>

  <!-- Pelican beak upper -->
  <path d="M 218 110 L 245 110 Q 240 115 218 115 Z" fill="#FFE4B5"/>

  <!-- Pelican neck -->
  <path d="M 200 130 Q 195 140 190 160" fill="none" stroke="#FFF8DC" stroke-width="12"/>

  <!-- Pelican wing -->
  <ellipse cx="160" cy="155" rx="20" ry="35" fill="#F5DEB3" opacity="0.7"/>

  <!-- Pelican legs -->
  <line x1="185" y1="195" x2="180" y2="225" stroke="#FF8C00" stroke-width="3"/>
  <line x1="195" y1="195" x2="200" y2="225" stroke="#FF8C00" stroke-width="3"/>

  <!-- Feet -->
  <g fill="#FF8C00">
    <circle cx="180" cy="228" r="3"/>
    <circle cx="200" cy="228" r="3"/>
  </g>

  <!-- Happiness: pelican smile -->
  <path d="M 205 115 Q 210 120 215 115" fill="none" stroke="#000" stroke-width="1" stroke-linecap="round"/>

  <!-- Clouds -->
  <ellipse cx="50" cy="40" rx="25" ry="15" fill="#FFF" opacity="0.8"/>
  <ellipse cx="30" cy="45" rx="20" ry="12" fill="#FFF" opacity="0.8"/>
  <ellipse cx="70" cy="45" rx="22" ry="13" fill="#FFF" opacity="0.8"/>

  <ellipse cx="320" cy="60" rx="28" ry="16" fill="#FFF" opacity="0.8"/>
  <ellipse cx="295" cy="65" rx="24" ry="13" fill="#FFF" opacity="0.8"/>
  <ellipse cx="350" cy="65" rx="25" ry="14" fill="#FFF" opacity="0.8"/>
</svg>
