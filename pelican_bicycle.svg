<svg viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="500" height="400" fill="#e3f2fd"/>

  <!-- Bicycle wheels -->
  <circle cx="150" cy="280" r="60" fill="none" stroke="#333" stroke-width="8"/>
  <circle cx="150" cy="280" r="50" fill="none" stroke="#999" stroke-width="1"/>
  <circle cx="150" cy="280" r="40" fill="none" stroke="#999" stroke-width="1"/>
  <!-- Wheel spokes -->
  <line x1="150" y1="220" x2="150" y2="340" stroke="#999" stroke-width="1"/>
  <line x1="90" y1="280" x2="210" y2="280" stroke="#999" stroke-width="1"/>
  <line x1="100" y1="230" x2="200" y2="330" stroke="#999" stroke-width="1"/>
  <line x1="100" y1="330" x2="200" y2="230" stroke="#999" stroke-width="1"/>

  <circle cx="380" cy="280" r="60" fill="none" stroke="#333" stroke-width="8"/>
  <circle cx="380" cy="280" r="50" fill="none" stroke="#999" stroke-width="1"/>
  <circle cx="380" cy="280" r="40" fill="none" stroke="#999" stroke-width="1"/>
  <!-- Wheel spokes -->
  <line x1="380" y1="220" x2="380" y2="340" stroke="#999" stroke-width="1"/>
  <line x1="320" y1="280" x2="440" y2="280" stroke="#999" stroke-width="1"/>
  <line x1="330" y1="230" x2="430" y2="330" stroke="#999" stroke-width="1"/>
  <line x1="330" y1="330" x2="430" y2="230" stroke="#999" stroke-width="1"/>

  <!-- Bicycle frame -->
  <line x1="150" y1="280" x2="260" y2="180" stroke="#333" stroke-width="4"/>
  <line x1="380" y1="280" x2="260" y2="180" stroke="#333" stroke-width="4"/>
  <line x1="260" y1="180" x2="270" y2="200" stroke="#333" stroke-width="4"/>
  <line x1="270" y1="200" x2="150" y2="280" stroke="#333" stroke-width="4"/>

  <!-- Seat -->
  <ellipse cx="265" cy="175" rx="25" ry="8" fill="#8b4513"/>
  <line x1="250" y1="175" x2="255" y2="185" stroke="#666" stroke-width="2"/>
  <line x1="280" y1="175" x2="275" y2="185" stroke="#666" stroke-width="2"/>

  <!-- Handlebars -->
  <line x1="260" y1="180" x2="260" y2="150" stroke="#333" stroke-width="4"/>
  <path d="M 240 150 Q 260 145 280 150" fill="none" stroke="#333" stroke-width="4"/>

  <!-- Pedals and crank -->
  <circle cx="265" cy="210" r="8" fill="#666"/>
  <line x1="265" y1="210" x2="265" y2="190" stroke="#666" stroke-width="3"/>
  <line x1="265" y1="210" x2="280" y2="225" stroke="#666" stroke-width="3"/>

  <!-- Pelican body -->
  <ellipse cx="265" cy="140" rx="45" ry="50" fill="#f5f5dc"/>

  <!-- Pelican wings (folded) -->
  <ellipse cx="230" cy="130" rx="20" ry="35" fill="#ddd" transform="rotate(-30 230 130)"/>
  <ellipse cx="300" cy="130" rx="20" ry="35" fill="#ddd" transform="rotate(30 300 130)"/>

  <!-- Pelican head -->
  <circle cx="265" cy="85" r="20" fill="#f5f5dc"/>

  <!-- Pelican distinctive bill -->
  <path d="M 280 85 Q 330 80 340 90 Q 330 95 280 92 Z" fill="#ffb347" stroke="#ff9800" stroke-width="1"/>

  <!-- Pelican throat pouch -->
  <path d="M 280 90 Q 310 95 315 110 Q 310 115 280 105" fill="#ffe4b5" stroke="#ff9800" stroke-width="1"/>

  <!-- Pelican eye -->
  <circle cx="275" cy="80" r="3" fill="#000"/>
  <circle cx="276" cy="79" r="1" fill="#fff"/>

  <!-- Pelican legs on pedals -->
  <line x1="265" y1="185" x2="260" y2="210" stroke="#666" stroke-width="4"/>
  <line x1="265" y1="185" x2="270" y2="210" stroke="#666" stroke-width="4"/>

  <!-- Pelican feet on pedals -->
  <circle cx="260" cy="215" r="5" fill="#ffb347"/>
  <circle cx="270" cy="215" r="5" fill="#ffb347"/>

  <!-- Happy expression -->
  <path d="M 270 85 Q 275 88 280 85" fill="none" stroke="#ff9800" stroke-width="1" stroke-linecap="round"/>
</svg>
