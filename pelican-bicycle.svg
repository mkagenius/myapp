<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#e8f4f8"/>

  <!-- Bicycle Frame -->
  <g id="bicycle">
    <!-- Back Wheel -->
    <circle cx="100" cy="200" r="50" fill="none" stroke="#333" stroke-width="3"/>
    <circle cx="100" cy="200" r="45" fill="none" stroke="#666" stroke-width="1"/>
    <!-- Spokes -->
    <line x1="100" y1="150" x2="100" y2="250" stroke="#999" stroke-width="1"/>
    <line x1="50" y1="200" x2="150" y2="200" stroke="#999" stroke-width="1"/>
    <line x1="65" y1="165" x2="135" y2="235" stroke="#999" stroke-width="1"/>
    <line x1="135" y1="165" x2="65" y2="235" stroke="#999" stroke-width="1"/>

    <!-- Front Wheel -->
    <circle cx="280" cy="200" r="50" fill="none" stroke="#333" stroke-width="3"/>
    <circle cx="280" cy="200" r="45" fill="none" stroke="#666" stroke-width="1"/>
    <!-- Spokes -->
    <line x1="280" y1="150" x2="280" y2="250" stroke="#999" stroke-width="1"/>
    <line x1="230" y1="200" x2="330" y2="200" stroke="#999" stroke-width="1"/>
    <line x1="245" y1="165" x2="315" y2="235" stroke="#999" stroke-width="1"/>
    <line x1="315" y1="165" x2="245" y2="235" stroke="#999" stroke-width="1"/>

    <!-- Frame -->
    <line x1="100" y1="200" x2="150" y2="120" stroke="#333" stroke-width="4" stroke-linecap="round"/>
    <line x1="150" y1="120" x2="280" y2="200" stroke="#333" stroke-width="4" stroke-linecap="round"/>
    <line x1="150" y1="120" x2="100" y2="200" stroke="#333" stroke-width="4" stroke-linecap="round"/>
    <line x1="150" y1="120" x2="280" y2="120" stroke="#333" stroke-width="4" stroke-linecap="round"/>
    <line x1="280" y1="120" x2="280" y2="200" stroke="#333" stroke-width="4" stroke-linecap="round"/>

    <!-- Seat -->
    <ellipse cx="150" cy="110" rx="25" ry="10" fill="#8B4513" stroke="#333" stroke-width="2"/>

    <!-- Handlebars -->
    <line x1="280" y1="120" x2="280" y2="90" stroke="#333" stroke-width="3" stroke-linecap="round"/>
    <line x1="270" y1="85" x2="290" y2="85" stroke="#333" stroke-width="3" stroke-linecap="round"/>

    <!-- Pedals -->
    <circle cx="150" cy="180" r="8" fill="#333"/>
    <line x1="120" y1="180" x2="180" y2="180" stroke="#333" stroke-width="2"/>
    <circle cx="120" cy="180" r="5" fill="#666"/>
    <circle cx="180" cy="180" r="5" fill="#666"/>
  </g>

  <!-- Pelican -->
  <g id="pelican">
    <!-- Body -->
    <ellipse cx="150" cy="105" rx="30" ry="25" fill="#f5f5dc" stroke="#333" stroke-width="2"/>

    <!-- Neck -->
    <path d="M 165 90 Q 175 70 180 50" fill="none" stroke="#f5f5dc" stroke-width="18" stroke-linecap="round"/>
    <path d="M 165 90 Q 175 70 180 50" fill="none" stroke="#333" stroke-width="2"/>

    <!-- Head -->
    <circle cx="180" cy="35" r="18" fill="#f5f5dc" stroke="#333" stroke-width="2"/>

    <!-- Large Beak/Pouch -->
    <ellipse cx="200" cy="40" rx="35" ry="18" fill="#ffa500" stroke="#333" stroke-width="2"/>

    <!-- Eye -->
    <circle cx="185" cy="28" r="4" fill="#333"/>
    <circle cx="186" cy="27" r="1.5" fill="#fff"/>

    <!-- Feather details on body -->
    <path d="M 135 100 Q 130 110 135 120" fill="none" stroke="#ddd" stroke-width="1.5"/>
    <path d="M 140 105 Q 135 115 140 125" fill="none" stroke="#ddd" stroke-width="1.5"/>
    <path d="M 165 100 Q 170 110 165 120" fill="none" stroke="#ddd" stroke-width="1.5"/>

    <!-- Wings (simple) -->
    <path d="M 130 105 Q 110 90 105 110" fill="#e8e8c8" stroke="#333" stroke-width="2"/>
    <path d="M 170 105 Q 190 90 195 110" fill="#e8e8c8" stroke="#333" stroke-width="2"/>

    <!-- Tail -->
    <path d="M 120 115 Q 100 130 95 150" fill="none" stroke="#f5f5dc" stroke-width="12" stroke-linecap="round"/>
    <path d="M 120 115 Q 100 130 95 150" fill="none" stroke="#333" stroke-width="2"/>

    <!-- Feet on pedals -->
    <g id="left-foot">
      <ellipse cx="140" cy="190" rx="6" ry="8" fill="#ff8c00"/>
      <line x1="140" y1="198" x2="138" y2="208" stroke="#ff8c00" stroke-width="2" stroke-linecap="round"/>
      <line x1="140" y1="198" x2="142" y2="208" stroke="#ff8c00" stroke-width="2" stroke-linecap="round"/>
    </g>

    <g id="right-foot">
      <ellipse cx="160" cy="190" rx="6" ry="8" fill="#ff8c00"/>
      <line x1="160" y1="198" x2="158" y2="208" stroke="#ff8c00" stroke-width="2" stroke-linecap="round"/>
      <line x1="160" y1="198" x2="162" y2="208" stroke="#ff8c00" stroke-width="2" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Smile/Happy expression -->
  <path d="M 175 45 Q 180 48 185 45" fill="none" stroke="#ff69b4" stroke-width="1.5" stroke-linecap="round"/>
</svg>
