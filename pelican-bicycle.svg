<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky -->
  <rect width="400" height="400" fill="#E0F6FF"/>

  <!-- Ground -->
  <rect y="300" width="400" height="100" fill="#90EE90"/>

  <!-- Bicycle Frame -->
  <line x1="150" y1="220" x2="250" y2="220" stroke="#333" stroke-width="3"/>
  <line x1="200" y1="220" x2="200" y2="150" stroke="#333" stroke-width="3"/>
  <line x1="150" y1="220" x2="200" y2="150" stroke="#333" stroke-width="3"/>
  <line x1="250" y1="220" x2="200" y2="150" stroke="#333" stroke-width="3"/>

  <!-- Handlebars -->
  <line x1="200" y1="140" x2="180" y2="130" stroke="#333" stroke-width="2"/>
  <line x1="200" y1="140" x2="220" y2="130" stroke="#333" stroke-width="2"/>
  <circle cx="180" cy="130" r="3" fill="#333"/>
  <circle cx="220" cy="130" r="3" fill="#333"/>

  <!-- Seat -->
  <ellipse cx="200" cy="160" rx="15" ry="8" fill="#8B4513"/>

  <!-- Back wheel -->
  <circle cx="150" cy="220" r="50" fill="none" stroke="#333" stroke-width="2"/>
  <circle cx="150" cy="220" r="45" fill="none" stroke="#666" stroke-width="1"/>
  <line x1="150" y1="170" x2="150" y2="270" stroke="#666" stroke-width="1"/>
  <line x1="100" y1="220" x2="200" y2="220" stroke="#666" stroke-width="1"/>

  <!-- Front wheel -->
  <circle cx="250" cy="220" r="50" fill="none" stroke="#333" stroke-width="2"/>
  <circle cx="250" cy="220" r="45" fill="none" stroke="#666" stroke-width="1"/>
  <line x1="250" y1="170" x2="250" y2="270" stroke="#666" stroke-width="1"/>
  <line x1="200" y1="220" x2="300" y2="220" stroke="#666" stroke-width="1"/>

  <!-- Pelican Body -->
  <ellipse cx="200" cy="165" rx="35" ry="40" fill="#F5DEB3" stroke="#D4A574" stroke-width="2"/>

  <!-- Pelican Neck -->
  <path d="M 210 140 Q 215 110 210 90" fill="none" stroke="#F5DEB3" stroke-width="12" stroke-linecap="round"/>

  <!-- Pelican Head -->
  <circle cx="210" cy="75" r="18" fill="#F5DEB3" stroke="#D4A574" stroke-width="2"/>

  <!-- Pelican Eye -->
  <circle cx="220" cy="70" r="4" fill="#333"/>
  <circle cx="222" cy="68" r="1.5" fill="white"/>

  <!-- Pelican Beak (large pouch) -->
  <path d="M 225 78 Q 240 82 245 88 Q 243 95 230 92 Q 220 90 225 78" fill="#FFD700" stroke="#D4A574" stroke-width="1.5"/>

  <!-- Pelican Wing -->
  <path d="M 195 160 Q 170 150 165 175" fill="none" stroke="#D4A574" stroke-width="3" stroke-linecap="round"/>

  <!-- Pelican Tail -->
  <path d="M 170 195 Q 155 190 150 210" fill="none" stroke="#D4A574" stroke-width="2" stroke-linecap="round"/>

  <!-- Pelican Legs -->
  <line x1="190" y1="200" x2="185" y2="220" stroke="#FF8C00" stroke-width="3" stroke-linecap="round"/>
  <line x1="210" y1="200" x2="215" y2="220" stroke="#FF8C00" stroke-width="3" stroke-linecap="round"/>

  <!-- Pelican Feet -->
  <circle cx="185" cy="220" r="4" fill="#FF8C00"/>
  <circle cx="215" cy="220" r="4" fill="#FF8C00"/>

  <!-- Clouds -->
  <g opacity="0.6">
    <ellipse cx="80" cy="60" rx="25" ry="15" fill="white"/>
    <ellipse cx="100" cy="55" rx="30" ry="18" fill="white"/>
    <ellipse cx="60" cy="55" rx="20" ry="12" fill="white"/>
  </g>

  <g opacity="0.6">
    <ellipse cx="320" cy="80" rx="30" ry="16" fill="white"/>
    <ellipse cx="345" cy="75" rx="25" ry="14" fill="white"/>
    <ellipse cx="300" cy="75" rx="22" ry="13" fill="white"/>
  </g>
</svg>
