<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#e8f4f8"/>

  <!-- Bicycle wheels -->
  <circle cx="100" cy="220" r="45" fill="none" stroke="#333" stroke-width="3"/>
  <circle cx="100" cy="220" r="35" fill="none" stroke="#666" stroke-width="1"/>
  <circle cx="280" cy="220" r="45" fill="none" stroke="#333" stroke-width="3"/>
  <circle cx="280" cy="220" r="35" fill="none" stroke="#666" stroke-width="1"/>

  <!-- Wheel centers -->
  <circle cx="100" cy="220" r="4" fill="#333"/>
  <circle cx="280" cy="220" r="4" fill="#333"/>

  <!-- Bicycle frame -->
  <line x1="100" y1="220" x2="150" y2="140" stroke="#333" stroke-width="3"/>
  <line x1="150" y1="140" x2="280" y2="220" stroke="#333" stroke-width="3"/>
  <line x1="150" y1="140" x2="100" y2="220" stroke="#333" stroke-width="3"/>
  <line x1="150" y1="140" x2="280" y2="220" stroke="#333" stroke-width="3"/>
  <line x1="100" y1="220" x2="280" y2="220" stroke="#333" stroke-width="3"/>

  <!-- Seat -->
  <ellipse cx="160" cy="130" rx="20" ry="8" fill="#8b4513"/>

  <!-- Handlebars -->
  <line x1="150" y1="140" x2="140" y2="120" stroke="#333" stroke-width="2"/>
  <ellipse cx="130" cy="115" rx="12" ry="6" fill="none" stroke="#333" stroke-width="2"/>

  <!-- Pedals and crank -->
  <circle cx="155" cy="180" r="6" fill="#333"/>
  <line x1="155" y1="180" x2="155" y2="150" stroke="#333" stroke-width="2"/>
  <line x1="155" y1="180" x2="155" y2="210" stroke="#333" stroke-width="2"/>

  <!-- Pelican body -->
  <ellipse cx="180" cy="140" rx="35" ry="28" fill="#f5e6d3"/>

  <!-- Pelican neck -->
  <path d="M 200 125 Q 210 110 215 95" stroke="#f5e6d3" stroke-width="18" fill="none" stroke-linecap="round"/>

  <!-- Pelican head -->
  <circle cx="215" cy="85" r="15" fill="#f5e6d3"/>
  <circle cx="218" cy="82" r="6" fill="#000"/>
  <circle cx="220" cy="81" r="2" fill="#fff"/>

  <!-- Pelican beak (distinctive pouch) -->
  <path d="M 228 88 Q 245 90 250 95 Q 245 92 228 90 Z" fill="#ff9f43"/>
  <path d="M 228 88 Q 250 95 250 100 Q 245 95 228 92 Z" fill="#ff7f43"/>
  <path d="M 250 95 L 255 100 Q 250 103 245 100" fill="#ffc857"/>

  <!-- Pelican wing -->
  <path d="M 185 140 Q 165 120 160 110 Q 170 125 185 150" fill="#e8d4b8" stroke="#d4c4a8" stroke-width="1"/>
  <path d="M 185 140 Q 170 145 155 140" fill="#d4c4a8"/>

  <!-- Pelican legs on pedals -->
  <line x1="180" y1="165" x2="175" y2="190" stroke="#f5a500" stroke-width="3"/>
  <line x1="190" y1="165" x2="195" y2="190" stroke="#f5a500" stroke-width="3"/>

  <!-- Pelican feet -->
  <path d="M 175 190 L 170 198 M 175 190 L 175 198 M 175 190 L 180 198" stroke="#f5a500" stroke-width="2" fill="none"/>
  <path d="M 195 190 L 190 198 M 195 190 L 195 198 M 195 190 L 200 198" stroke="#f5a500" stroke-width="2" fill="none"/>

  <!-- Pelican eye happy -->
  <path d="M 218 82 Q 218 85 220 85" fill="none" stroke="#000" stroke-width="1"/>

  <!-- Sun -->
  <circle cx="350" cy="50" r="25" fill="#ffd700"/>
  <line x1="350" y1="15" x2="350" y2="5" stroke="#ffd700" stroke-width="3"/>
  <line x1="350" y1="85" x2="350" y2="95" stroke="#ffd700" stroke-width="3"/>
  <line x1="315" y1="50" x2="305" y2="50" stroke="#ffd700" stroke-width="3"/>
  <line x1="385" y1="50" x2="395" y2="50" stroke="#ffd700" stroke-width="3"/>
</svg>